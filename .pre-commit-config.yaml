repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke test
        entry: uv run --extra dev python -m pytest python/dhquant/tests/test_smoke.py
        language: system
        pass_filenames: false
        stages: [push]
